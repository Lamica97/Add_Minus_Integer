<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สุ่มโจทย์คณิตศาสตร์ - การบวกและการลบจำนวนเต็ม</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(30, 41, 59, 0.85);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --secondary-color: #f59e0b;
            --secondary-hover: #d97706;
            --success-color: #10b981;
            --error-color: #ef4444;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        header p {
            font-size: 1.1rem;
            font-weight: 300;
            opacity: 0.9;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 40px 30px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .score-board {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--primary-color);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.4);
        }

        .problem-container {
            margin: 30px 0;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .problem {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: 2px;
        }

        .choices-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .choice-btn {
            padding: 15px 10px;
            font-size: 1.5rem;
            font-weight: 600;
            border: 2px solid #334155;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Prompt', sans-serif;
            color: var(--text-primary);
            background: rgba(15, 23, 42, 0.5);
            transition: all 0.3s ease;
        }

        .choice-btn:hover:not(:disabled) {
            border-color: var(--primary-color);
            background: rgba(99, 102, 241, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
        }

        .choice-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .choice-btn.correct {
            background: var(--success-color) !important;
            border-color: var(--success-color) !important;
            color: white;
        }

        .choice-btn.incorrect {
            background: var(--error-color) !important;
            border-color: var(--error-color) !important;
            color: white;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Prompt', sans-serif;
            transition: all 0.3s ease;
            width: 100%;
        }

        .primary-btn {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 6px rgba(102, 126, 234, 0.3);
        }

        .primary-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(102, 126, 234, 0.4);
        }

        .primary-btn:active {
            transform: translateY(0);
        }

        .secondary-btn {
            background: var(--secondary-color);
            color: white;
            box-shadow: 0 4px 6px rgba(237, 137, 54, 0.3);
            margin-top: 15px;
        }

        .secondary-btn:hover {
            background: var(--secondary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(237, 137, 54, 0.4);
        }

        .feedback {
            font-size: 1.2rem;
            font-weight: 600;
            min-height: 30px;
            margin: 15px 0;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .feedback.show {
            opacity: 1;
            transform: translateY(0);
        }

        .feedback.correct {
            color: var(--success-color);
        }

        .feedback.incorrect {
            color: var(--error-color);
        }

        .hidden {
            display: none !important;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .pop {
            animation: pop 0.4s ease-out forwards;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>ฝึกฝนการบวกและลบจำนวนเต็ม</h1>
            <p>โจทย์ตัวเลขระหว่าง -25 ถึง 25</p>
        </header>

        <main class="card">
            <div class="score-board">
                <div class="score">คะแนน: <span id="score">0</span></div>
            </div>

            <div class="problem-container">
                <div id="problem" class="problem">เตรียมพร้อม...</div>
            </div>

            <div class="choices-container" id="choices">
                <!-- Choice buttons will be injected here by JS -->
            </div>

            <div id="feedback" class="feedback"></div>

            <button id="next-btn" class="btn secondary-btn hidden">ข้อต่อไป</button>
        </main>
    </div>

    <script>
document.addEventListener('DOMContentLoaded', () => {
    const problemElement = document.getElementById('problem');
    const choicesContainer = document.getElementById('choices');
    const nextBtn = document.getElementById('next-btn');
    const feedbackElement = document.getElementById('feedback');
    const scoreElement = document.getElementById('score');

    let currentAnswer = 0;
    let score = 0;
    let choicesBtns = [];

    // Helper: generate random integer between min and max (inclusive)
    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // Helper: shuffle array
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function generateProblem() {
        // Clear previous state
        choicesContainer.innerHTML = '';
        choicesBtns = [];
        nextBtn.classList.add('hidden');
        feedbackElement.classList.remove('show', 'correct', 'incorrect');
        problemElement.classList.remove('pop');

        // Generate numbers between -25 and 25
        const num1 = getRandomInt(-25, 25);
        const num2 = getRandomInt(-25, 25);
        
        // Generate operator: 0 for '+', 1 for '-'
        const isAddition = getRandomInt(0, 1) === 0;
        const operatorStr = isAddition ? '+' : '-';

        // Calculate correct answer
        currentAnswer = isAddition ? num1 + num2 : num1 - num2;

        // Format problem display
        let displayStr = `${num1} ${operatorStr} `;
        
        // Wrap negative second numbers in parentheses for clarity
        if (num2 < 0) {
            displayStr += `(${num2})`;
        } else {
            displayStr += `${num2}`;
        }
        displayStr += ' = ?';

        problemElement.textContent = displayStr;
        
        // Generate smart choices (distractors based on common mistakes)
        let choicesSet = new Set();
        choicesSet.add(currentAnswer);
        
        // Mistake 1: Wrong sign of the correct answer
        choicesSet.add(currentAnswer === 0 ? 0 : -currentAnswer);

        // Mistake 2: Adding instead of subtracting, or subtracting instead of adding (absolute values)
        let mag1 = Math.abs(num1);
        let mag2 = Math.abs(num2);
        
        let sumMag = mag1 + mag2;
        let diffMag = Math.abs(mag1 - mag2);

        choicesSet.add(sumMag);
        choicesSet.add(-sumMag);
        choicesSet.add(diffMag);
        choicesSet.add(-diffMag);

        // Convert set to array and prioritize filling the 4 slots
        let allPossibleChoices = Array.from(choicesSet);
        let choices = [currentAnswer];
        
        for (let c of allPossibleChoices) {
            if (choices.length >= 4) break;
            if (c !== currentAnswer) {
                choices.push(c);
            }
        }
        
        // If we still don't have 4 choices (e.g. num1=0 or num2=0), add small offsets
        let offset = 1;
        while (choices.length < 4) {
            let val1 = currentAnswer + offset;
            let val2 = currentAnswer - offset;
            
            if (!choices.includes(val1)) {
                choices.push(val1);
            }
            if (choices.length >= 4) break;
            
            if (!choices.includes(val2)) {
                choices.push(val2);
            }
            offset++;
        }
        
        choices = shuffleArray(choices);

        // Render choice buttons
        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.classList.add('choice-btn');
            btn.textContent = choice;
            btn.addEventListener('click', () => checkAnswer(choice, btn));
            choicesContainer.appendChild(btn);
            choicesBtns.push(btn);
        });

        // Trigger pop animation
        setTimeout(() => {
            problemElement.classList.add('pop');
        }, 10);
    }

    function checkAnswer(selectedAnswer, clickedBtn) {
        // Disable all buttons
        choicesBtns.forEach(btn => btn.disabled = true);
        
        nextBtn.classList.remove('hidden');
        nextBtn.focus();

        feedbackElement.classList.remove('correct', 'incorrect');
        feedbackElement.classList.add('show');

        if (selectedAnswer === currentAnswer) {
            score += 10;
            scoreElement.textContent = score;
            feedbackElement.textContent = 'ถูกต้อง! เยี่ยมมาก 🎉';
            feedbackElement.classList.add('correct');
            clickedBtn.classList.add('correct');
        } else {
            // Apply shake animation to card
            const card = document.querySelector('.card');
            card.classList.remove('shake');
            setTimeout(() => card.classList.add('shake'), 10);
            
            feedbackElement.textContent = `ผิดครับ! คำตอบที่ถูกต้องคือ ${currentAnswer}`;
            feedbackElement.classList.add('incorrect');
            clickedBtn.classList.add('incorrect');
            
            // Highlight correct answer
            choicesBtns.forEach(btn => {
                if (parseInt(btn.textContent) === currentAnswer) {
                    btn.classList.add('correct');
                }
            });
        }
    }

    // Event listeners
    nextBtn.addEventListener('click', generateProblem);

    nextBtn.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            generateProblem();
        }
    });

    // Init first problem
    generateProblem();
});
    </script>
</body>
</html>
